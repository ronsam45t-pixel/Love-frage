<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine's Proposal</title>
    <style>
        body {
            background-color: #ff69b4; /* Dark pink background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            color: white;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        .heart {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://example.com/red-heart-background.jpg') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="heart"></div>
    <h1>WILL YOU BE MY VALENTINE</h1>
</body>
</html>
