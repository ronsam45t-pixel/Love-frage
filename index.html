<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine Proposal</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #ffcccb; }
        #noButton { padding: 20px; font-size: 24px; background-color: red; color: white; border: none; cursor: pointer; position: absolute; }
    </style>
</head>
<body>
    <h1>Will you be my Valentine?</h1>
    <button id="noButton">NO</button>
    <script>
        const noButton = document.getElementById('noButton');
        const messages = ["ARE YOU SURE?", "PRETTY PLEASE WITH A CHERRY ON TOP?", "PLEASE POOKIE? 😍"]; 
        let messageIndex = 0;

        noButton.addEventListener('mouseover', function () {
            // Move the button away from the cursor
            const x = Math.random() * (window.innerWidth - noButton.offsetWidth);
            const y = Math.random() * (window.innerHeight - noButton.offsetHeight);
            noButton.style.left = `${x}px`;
            noButton.style.top = `${y}px`;
        });

        noButton.addEventListener('click', function () {
            messageIndex = (messageIndex + 1) % messages.length;
            noButton.textContent = messages[messageIndex];

            // Make the button smaller with each click
            let currentSize = parseFloat(window.getComputedStyle(noButton).fontSize);
            noButton.style.fontSize = (currentSize * 0.9) + 'px';
        });
    </script>
</body>
</html>
