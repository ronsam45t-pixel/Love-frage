<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Frage</title>
    <style>
        body {
            background: url('https://example.com/bunny-background.png') no-repeat center center fixed;
            background-size: cover;
            text-align: center;
            font-family: 'Love Letters', cursive;
        }
        h1 {
            font-size: 3em;
        }
        .button-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 1.5em;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <h1>Do You Love Me?</h1>
    <div class="button-container">
        <button id="yesBtn">YES</button>
        <button id="noBtn">NO</button>
    </div>
    <script>
        let noClickCount = 0;
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');

        yesBtn.onclick = function() {
            alert('Thank you for your love! 😊');
        };

        noBtn.onclick = function() {
            noClickCount++;
            if (noClickCount >= 6) {
                noBtn.style.display = 'none';
                alert('You must choose YES!');
            }
        };
    </script>
</body>
</html>
